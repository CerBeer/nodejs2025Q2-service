services:
  app:
    container_name: app
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    restart: always
    volumes:
      - node_modules:/app/node_modules
      - app_logs:/app/logs
    ports:
      - ${PORT}:${PORT}
    depends_on:
      - postgres
    networks:
      - intranet
    develop:
      watch:
        - action: sync+restart
          path: ./src
          target: /app/src
          ignore:
            - node_modules

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    env_file:
      - .env
    restart: always
    ports:
      - '${POSTGRES_PORT}:${POSTGRES_PORT}'
    volumes:
      - pgdata:/var/lib/postgresql/data
      - pglog:/var/log/postgresql
    networks:
      - intranet
   
volumes:
  pgdata:
  pglog:
  node_modules:
  app_logs:

networks:
  intranet:
    name: intranet
    driver: bridge